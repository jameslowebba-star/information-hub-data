name: Geopolitical Risk Tracker

on:
  schedule:
    - cron: '0 * * * *'  # Every hour on the hour
  workflow_dispatch:

jobs:
  update-risks:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Run geopolitical risk tracker
        env:
          GH_TOKEN: ${{ secrets.GH_TOKEN }}
        run: python fetch_geo_risks.py
