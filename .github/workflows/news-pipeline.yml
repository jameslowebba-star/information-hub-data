name: News Pipeline

on:
  schedule:
    - cron: '15 * * * *'
  workflow_dispatch:

jobs:
  fetch-news:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Run news pipeline
        env:
          GH_TOKEN: ${{ secrets.GH_TOKEN }}
        run: python fetch_news.py

