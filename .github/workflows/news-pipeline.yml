name: News Pipeline

on:
  schedule:
    # Run twice per hour — GitHub Actions cron is unreliable on shared
    # infrastructure and often skips runs, so we double up to keep the
    # feed under the 150-min staleness threshold.
    - cron: '*/30 * * * *'
  workflow_dispatch:

jobs:
  fetch-news:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Run news pipeline
        env:
          GH_TOKEN: ${{ secrets.GH_TOKEN }}
        run: python fetch_news.py

