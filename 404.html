<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>404 — Page Not Found | Information Hub</title>
  <link rel="icon" type="image/svg+xml" href="./favicon.svg">

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300..700&family=Oswald:wght@300..700&display=swap" rel="stylesheet">

  <link rel="stylesheet" href="./base.css">
  <link rel="stylesheet" href="./style.css">
  <style>
    .error-page {
      min-height: 100dvh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: var(--space-8);
      gap: var(--space-6);
    }
    .error-code {
      font-family: var(--font-display);
      font-size: clamp(5rem, 15vw, 12rem);
      font-weight: 700;
      color: var(--color-divider);
      line-height: 1;
      letter-spacing: -0.02em;
    }
    .error-title {
      font-family: var(--font-display);
      font-size: var(--text-xl);
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.02em;
    }
    .error-desc {
      font-size: var(--text-base);
      color: var(--color-text-muted);
      max-width: 42ch;
      line-height: 1.7;
    }
    .error-btn {
      display: inline-flex;
      align-items: center;
      gap: var(--space-2);
      padding: var(--space-3) var(--space-6);
      border-radius: var(--radius-md);
      font-family: var(--font-display);
      font-size: var(--text-sm);
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.04em;
      background: var(--color-primary);
      color: #fff;
      text-decoration: none;
      transition: background var(--transition), transform var(--transition), box-shadow var(--transition);
    }
    .error-btn:hover {
      background: var(--color-primary-hover);
      transform: translateY(-1px);
      box-shadow: var(--shadow-md);
    }
    .error-btn:active {
      transform: translateY(0);
    }
  </style>
</head>
<body>
  <div class="error-page">
    <a href="./index.html" class="logo-pill" aria-label="Information Hub Home">
      <span class="logo-text"><span class="light">INFORMATION</span><span class="bold">HUB</span></span>
    </a>
    <div class="error-code">404</div>
    <h1 class="error-title">Page Not Found</h1>
    <p class="error-desc">The page you're looking for doesn't exist or has been moved. Head back to the homepage to continue reading.</p>
    <a href="./index.html" class="error-btn">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M19 12H5M12 19l-7-7 7-7"/></svg>
      Back to Home
    </a>
  </div>
</body>
</html>
